{# Favicons + PWA. ?v=asset_version busts browser cache after icon updates. #}
<link rel="icon" type="image/png" sizes="32x32" href="{{ url_for('static', filename='icons/favicon-32x32.png') }}?v={{ asset_version }}">
<link rel="icon" type="image/png" sizes="16x16" href="{{ url_for('static', filename='icons/favicon-16x16.png') }}?v={{ asset_version }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ url_for('static', filename='icons/apple-touch-icon.png') }}?v={{ asset_version }}">
<link rel="manifest" href="{{ url_for('static', filename='icons/site.webmanifest') }}?v={{ asset_version }}">
<meta name="theme-color" content="#0b1020">
