# Weekday inference refresh on Railway (/data volume — no bundle upload).
# Configure repository secrets per your deployment environment.
name: Daily update (Railway)

on:
  schedule:
    # Mon–Fri 22:00 UTC ≈ 6:00 PM ET (EDT). Adjust to 23 for EST/winter.
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-update-railway
  cancel-in-progress: false

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Configure SSH for Railway
        env:
          RAILWAY_SSH_PRIVATE_KEY: ${{ secrets.RAILWAY_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$RAILWAY_SSH_PRIVATE_KEY" ]; then
            echo "Missing secret RAILWAY_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$RAILWAY_SSH_PRIVATE_KEY" > ~/.ssh/railway_actions
          chmod 600 ~/.ssh/railway_actions
          ssh-keyscan -H ssh.railway.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Sync pipeline code to Railway container
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
        run: |
          if [ -z "$RAILWAY_API_TOKEN" ]; then
            echo "Missing RAILWAY_API_TOKEN"
            exit 1
          fi
          for var in RAILWAY_PROJECT_ID RAILWAY_SERVICE RAILWAY_ENVIRONMENT; do
            if [ -z "${!var}" ]; then
              echo "Missing secret $var"
              exit 1
            fi
          done
          unset RAILWAY_TOKEN || true
          # Data lives on /data volume; Python scripts must track git main.
          # The container image is only rebuilt on Railway deploy — sync scripts/src each run.
          tar czf - scripts src \
            | railway ssh \
                -p "$RAILWAY_PROJECT_ID" \
                -s "$RAILWAY_SERVICE" \
                -e "$RAILWAY_ENVIRONMENT" \
                -i ~/.ssh/railway_actions \
                -- sh -c 'cd /app && tar xzf -'

      - name: Run daily update in Railway container
        env:
          # Account token (NOT project token). Create at Railway → Account → Tokens,
          # select "No workspace".
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
        run: |
          unset RAILWAY_TOKEN || true
          railway ssh \
            -p "$RAILWAY_PROJECT_ID" \
            -s "$RAILWAY_SERVICE" \
            -e "$RAILWAY_ENVIRONMENT" \
            -i ~/.ssh/railway_actions \
            -- sh -c 'cd /app && python scripts/daily_update.py && PUBLISH_SOURCE=github_actions python scripts/stamp_published.py'

      - name: Smoke check /api/data-status
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
        run: |
          if [ -z "$RAILWAY_API_URL" ]; then
            echo "RAILWAY_API_URL not set — skipping smoke check"
            exit 0
          fi
          curl -sf "${RAILWAY_API_URL%/}/api/data-status" | python3 -m json.tool
