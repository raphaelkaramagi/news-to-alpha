# Weekday inference refresh on GitHub Actions (not inside Railway).
# Pulls /data from Railway, runs daily_update on the runner, publishes back.
#
# Required repository secrets:
#   RAILWAY_API_TOKEN  — Account token (Railway → Account → Tokens → "No workspace")
#   RAILWAY_SSH_PRIVATE_KEY, RAILWAY_PROJECT_ID, RAILWAY_SERVICE, RAILWAY_ENVIRONMENT
#   RAILWAY_API_URL, NEWS_API_KEY
name: Daily update (GitHub Actions)

on:
  schedule:
    # Mon–Fri 22:00 UTC ≈ 6:00 PM ET (EDT). Adjust to 23 for EST/winter.
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      RAILWAY_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
      RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Configure SSH for Railway
        env:
          RAILWAY_SSH_PRIVATE_KEY: ${{ secrets.RAILWAY_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$RAILWAY_SSH_PRIVATE_KEY" ]; then
            echo "Missing secret RAILWAY_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$RAILWAY_SSH_PRIVATE_KEY" > ~/.ssh/railway_actions
          chmod 600 ~/.ssh/railway_actions
          echo "RAILWAY_SSH_KEY_PATH=$HOME/.ssh/railway_actions" >> "$GITHUB_ENV"
          ssh-keyscan -H ssh.railway.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Verify Railway access
        run: |
          for var in RAILWAY_TOKEN RAILWAY_PROJECT_ID RAILWAY_SERVICE RAILWAY_ENVIRONMENT; do
            if [ -z "${!var}" ]; then
              echo "::error::Missing secret $var"
              exit 1
            fi
          done
          echo "RAILWAY_TOKEN length: ${#RAILWAY_TOKEN} (expect ~36; 0 means secret empty)"
          if [ "${#RAILWAY_TOKEN}" -lt 10 ]; then
            echo "::error::RAILWAY_API_TOKEN secret is empty or too short"
            exit 1
          fi
          if ! railway whoami; then
            echo "::error::RAILWAY_API_TOKEN is invalid, expired, or not an Account token."
            echo "Railway → Account → Tokens → New token → 'No workspace' → copy once →"
            echo "GitHub → Settings → Secrets → update RAILWAY_API_TOKEN"
            exit 1
          fi
          railway ssh \
            -p "$RAILWAY_PROJECT_ID" \
            -s "$RAILWAY_SERVICE" \
            -e "$RAILWAY_ENVIRONMENT" \
            -i "$RAILWAY_SSH_KEY_PATH" \
            -- echo "ssh ok"

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            data/processed/finbert_cache.db
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Pull data from Railway volume
        run: |
          mkdir -p data
          railway ssh \
            -p "$RAILWAY_PROJECT_ID" \
            -s "$RAILWAY_SERVICE" \
            -e "$RAILWAY_ENVIRONMENT" \
            -i "$RAILWAY_SSH_KEY_PATH" \
            -- ls -la /data
          ITEMS=$(railway ssh \
            -p "$RAILWAY_PROJECT_ID" \
            -s "$RAILWAY_SERVICE" \
            -e "$RAILWAY_ENVIRONMENT" \
            -i "$RAILWAY_SSH_KEY_PATH" \
            -- sh -c 'cd /data && for p in database.db processed models; do [ -e "$p" ] && printf "%s " "$p"; done')
          if [ -z "$ITEMS" ]; then
            echo "::error::Nothing found under /data on Railway (need database.db, processed/, and/or models/)"
            exit 1
          fi
          echo "Pulling: $ITEMS"
          railway ssh \
            -p "$RAILWAY_PROJECT_ID" \
            -s "$RAILWAY_SERVICE" \
            -e "$RAILWAY_ENVIRONMENT" \
            -i "$RAILWAY_SSH_KEY_PATH" \
            -- sh -c "cd /data && tar czf - $ITEMS" \
            | tar xzf - -C data/
          ls -la data/

      - name: Run daily update on runner
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          if [ -z "$NEWS_API_KEY" ]; then
            echo "Missing secret NEWS_API_KEY (Finnhub)"
            exit 1
          fi
          python scripts/daily_update.py

      - name: Publish bundle to Railway
        run: |
          python scripts/publish_deploy_bundle.py \
            --target railway \
            --service "$RAILWAY_SERVICE" \
            --output deploy_bundle

      - name: Smoke check /api/data-status
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
        run: |
          if [ -z "$RAILWAY_API_URL" ]; then
            echo "RAILWAY_API_URL not set — skipping smoke check"
            exit 0
          fi
          curl -sf "${RAILWAY_API_URL%/}/api/data-status" | python3 -m json.tool
