# Weekday inference refresh on GitHub Actions (not inside Railway).
# Pulls /data → daily_update on runner → publish back to Railway volume.
#
# Secrets: RAILWAY_API_TOKEN (Account, No workspace), RAILWAY_SSH_PRIVATE_KEY,
#          RAILWAY_PROJECT_ID, RAILWAY_SERVICE, RAILWAY_ENVIRONMENT,
#          RAILWAY_API_URL, NEWS_API_KEY
name: Daily update (GitHub Actions)

on:
  schedule:
    - cron: "0 22 * * 1-5"   # Mon–Fri 22:00 UTC ≈ 6 PM ET
  workflow_dispatch:

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    env:
      RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
      RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
      RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
      RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Configure SSH key
        env:
          RAILWAY_SSH_PRIVATE_KEY: ${{ secrets.RAILWAY_SSH_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$RAILWAY_SSH_PRIVATE_KEY" > ~/.ssh/railway_actions
          chmod 600 ~/.ssh/railway_actions
          echo "RAILWAY_SSH_KEY_PATH=$HOME/.ssh/railway_actions" >> "$GITHUB_ENV"
          ssh-keyscan -H ssh.railway.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt

      - uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            data/processed/finbert_cache.db
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: hf-${{ runner.os }}-

      - name: Pull /data from Railway
        run: |
          set -eo pipefail
          unset RAILWAY_TOKEN || true
          mkdir -p data
          SSH="railway ssh -p $RAILWAY_PROJECT_ID -s $RAILWAY_SERVICE -e $RAILWAY_ENVIRONMENT -i $RAILWAY_SSH_KEY_PATH"
          $SSH -- ls -la /data
          # Single tar stream (no $(...) capture — that broke set -e / stdout)
          $SSH -- sh -c 'cd /data && tar czf - database.db processed models' \
            | tar xzf - -C data/
          test -f data/database.db
          test -d data/models
          test -d data/processed
          ls -la data/

      - name: Run daily update
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: python scripts/daily_update.py

      - name: Publish to Railway
        run: |
          unset RAILWAY_TOKEN || true
          python scripts/publish_deploy_bundle.py \
            --target railway --service "$RAILWAY_SERVICE" --output deploy_bundle

      - name: Smoke check
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
        run: |
          if [ -n "$RAILWAY_API_URL" ]; then
            curl -sf "${RAILWAY_API_URL%/}/api/data-status" | python3 -m json.tool
          fi
