# Weekday inference refresh on GitHub Actions (not inside Railway).
# Pulls /data from Railway, runs daily_update locally on the runner, publishes back.
#
# Required repository secrets:
#   RAILWAY_API_TOKEN, RAILWAY_SSH_PRIVATE_KEY, RAILWAY_PROJECT_ID,
#   RAILWAY_SERVICE, RAILWAY_ENVIRONMENT, RAILWAY_API_URL, NEWS_API_KEY
name: Daily update (GitHub Actions)

on:
  schedule:
    # Mon–Fri 22:00 UTC ≈ 6:00 PM ET (EDT). Adjust to 23 for EST/winter.
    - cron: "0 22 * * 1-5"
  workflow_dispatch:

concurrency:
  group: daily-update
  cancel-in-progress: false

jobs:
  daily-update:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Configure SSH for Railway
        env:
          RAILWAY_SSH_PRIVATE_KEY: ${{ secrets.RAILWAY_SSH_PRIVATE_KEY }}
        run: |
          if [ -z "$RAILWAY_SSH_PRIVATE_KEY" ]; then
            echo "Missing secret RAILWAY_SSH_PRIVATE_KEY"
            exit 1
          fi
          mkdir -p ~/.ssh
          printf '%s\n' "$RAILWAY_SSH_PRIVATE_KEY" > ~/.ssh/railway_actions
          chmod 600 ~/.ssh/railway_actions
          echo "RAILWAY_SSH_KEY_PATH=$HOME/.ssh/railway_actions" >> "$GITHUB_ENV"
          ssh-keyscan -H ssh.railway.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Install Python dependencies
        run: |
          pip install --upgrade pip
          pip install --index-url https://download.pytorch.org/whl/cpu torch
          pip install -r requirements.txt

      - name: Cache HuggingFace models
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/huggingface
            data/processed/finbert_cache.db
          key: hf-${{ runner.os }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            hf-${{ runner.os }}-

      - name: Pull data from Railway volume
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
        run: |
          for var in RAILWAY_API_TOKEN RAILWAY_PROJECT_ID RAILWAY_SERVICE RAILWAY_ENVIRONMENT; do
            if [ -z "${!var}" ]; then
              echo "Missing secret $var"
              exit 1
            fi
          done
          unset RAILWAY_TOKEN || true
          python scripts/pull_railway_data.py --service "$RAILWAY_SERVICE"

      - name: Run daily update on runner
        env:
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          if [ -z "$NEWS_API_KEY" ]; then
            echo "Missing secret NEWS_API_KEY (Finnhub)"
            exit 1
          fi
          python scripts/daily_update.py

      - name: Publish bundle to Railway
        env:
          RAILWAY_API_TOKEN: ${{ secrets.RAILWAY_API_TOKEN }}
          RAILWAY_PROJECT_ID: ${{ secrets.RAILWAY_PROJECT_ID }}
          RAILWAY_SERVICE: ${{ secrets.RAILWAY_SERVICE }}
          RAILWAY_ENVIRONMENT: ${{ secrets.RAILWAY_ENVIRONMENT }}
        run: |
          unset RAILWAY_TOKEN || true
          python scripts/publish_deploy_bundle.py \
            --target railway \
            --service "$RAILWAY_SERVICE" \
            --output deploy_bundle

      - name: Smoke check /api/data-status
        env:
          RAILWAY_API_URL: ${{ secrets.RAILWAY_API_URL }}
        run: |
          if [ -z "$RAILWAY_API_URL" ]; then
            echo "RAILWAY_API_URL not set — skipping smoke check"
            exit 0
          fi
          curl -sf "${RAILWAY_API_URL%/}/api/data-status" | python3 -m json.tool
